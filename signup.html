<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>AuthProject · Sign Up</title>
    <link rel="stylesheet" href="css/style.css" />
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-auth-compat.js"></script>
</head>
<body>
    <header class="site-header">
        <div class="header-inner">
            <div class="logo-area">
                <svg class="logo-svg" width="36" height="36" viewBox="0 0 36 36" fill="none">
                    <rect x="2" y="2" width="32" height="32" rx="3" stroke="#000000" stroke-width="2.5" />
                    <path d="M10 10L26 10L26 14L10 14L10 10Z" fill="#000000" />
                    <path d="M10 18L22 18L22 22L10 22L10 18Z" fill="#000000" />
                    <path d="M10 26L18 26L18 30L10 30L10 26Z" fill="#000000" />
                </svg>
                <span class="site-name">AuthProject</span>
            </div>
            <button class="nav-toggle" id="navToggle" aria-label="Toggle navigation">
                <span class="dot"></span><span class="dot"></span><span class="dot"></span>
            </button>
        </div>
        <nav class="nav-links" id="navLinks">
            <a href="index.html">Home</a>
            <a href="login.html">Login</a>
            <a href="signup.html" class="active">Sign Up</a>
            <a href="terms.html">Terms</a>
            <a href="privacy.html">Privacy</a>
            <a href="disclaimer.html">Disclaimer</a>
            <a href="about.html">About</a>
        </nav>
    </header>

    <main class="main-content">
        <section class="auth-section">
            <h2 class="section-title">Sign Up</h2>
            <div id="flashMessage" class="flash-message"></div>
            <form id="signupForm">
                <div class="form-group">
                    <label for="signupName">Full Name</label>
                    <input type="text" id="signupName" required />
                </div>
                <div class="form-group">
                    <label for="signupEmail">Email</label>
                    <input type="email" id="signupEmail" required />
                </div>
                <div class="form-group">
                    <label for="signupPassword">Password (6+ chars)</label>
                    <input type="password" id="signupPassword" required minlength="6" />
                </div>
                <button type="submit" class="btn btn-primary">Create Account</button>
            </form>
            <p class="auth-switch">Already have an account? <a href="login.html">Login</a></p>
        </section>
    </main>

    <footer class="site-footer">
        <div class="footer-inner">
            <div class="footer-left"><span class="footer-brand">AuthProject © 2026</span></div>
            <button class="footer-toggle" id="footerToggle" aria-label="Expand footer links">
                <span class="dot"></span><span class="dot"></span><span class="dot"></span>
            </button>
        </div>
        <div class="footer-links" id="footerLinks">
            <a href="index.html">Home</a>
            <a href="login.html">Login</a>
            <a href="signup.html">Sign Up</a>
            <a href="terms.html">Terms</a>
            <a href="privacy.html">Privacy</a>
            <a href="disclaimer.html">Disclaimer</a>
            <a href="about.html">About</a>
        </div>
    </footer>

    <script src="js/common.js"></script>
    <script src="js/signup.js"></script>
</body>
</html>
