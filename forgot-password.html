<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mockly – Forgot Password</title>
    <link rel="stylesheet" href="Style.css">
    <!-- Firebase Compat SDKs -->
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-auth-compat.js"></script>
</head>
<body>
    <header class="nav" role="banner">
        <div class="nav-inner">
            <a href="index.html" class="nav-logo" aria-label="Mockly Home">Mock<span>ly</span></a>
            <a href="index.html" class="btn btn-outline" style="color:#ccc;">← Back to Home</a>
        </div>
    </header>

    <main id="main-content">
        <section class="section">
            <div class="container">
                <div class="form-page">
                    <h2>Forgot Your Password?</h2>
                    <p class="subtitle">Enter your registered email address and we'll send you a password‑reset link.</p>
                    <div class="form-group">
                        <label for="forgotEmail">Email</label>
                        <input type="email" id="forgotEmail" placeholder="you@example.com" autocomplete="email">
                    </div>
                    <button class="btn btn-primary btn-full" id="forgotSubmitBtn">Send Reset Email</button>
                    <p id="forgotMessage" style="text-align:center; margin-top:1rem; font-size:0.9rem;"></p>
                </div>
            </div>
        </section>
    </main>

    <footer class="footer" role="contentinfo">
        <div class="container">
            <div class="footer-bottom">
                <span>&copy; 2026 Mockly</span>
            </div>
        </div>
    </footer>

    <!-- Firebase + Custom Script -->
    <script src="firebase.js"></script>
    <script>
        document.getElementById('forgotSubmitBtn').addEventListener('click', async () => {
            const email = document.getElementById('forgotEmail').value.trim();
            const msg = document.getElementById('forgotMessage');
            if (!email) {
                msg.textContent = 'Please enter your email.';
                msg.style.color = '#d32f2f';
                return;
            }
            msg.textContent = 'Sending password‑reset email…';
            msg.style.color = '';
            try {
                await sendPasswordReset(email);
                msg.textContent = '✅ Password‑reset email sent! Check your inbox.';
                msg.style.color = '#16a34a';
            } catch (error) {
                msg.textContent = '❌ ' + error.message;
                msg.style.color = '#d32f2f';
            }
        });
    </script>
</body>
</html>
