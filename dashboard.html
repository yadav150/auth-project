<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mockly – Dashboard</title>
    <link rel="stylesheet" href="Style.css">
    <!-- Firebase Compat SDKs -->
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-auth-compat.js"></script>
</head>
<body>

    <header class="nav" role="banner">
        <div class="nav-inner">
            <a href="index.html" class="nav-logo" aria-label="Mockly Home">Mock<span>ly</span></a>
            <div class="nav-actions">
                <button class="btn btn-outline" id="btnLogout">Logout</button>
            </div>
        </div>
    </header>

    <main id="main-content">
        <section class="section dashboard-page" aria-labelledby="dashboard-heading">
            <div class="container">
                <div class="section-header">
                    <h2 id="dashboard-heading">My Dashboard</h2>
                    <p id="dashboardWelcome">Welcome back!</p>
                </div>
                <div class="dashboard-grid">
                    <div class="dash-stat-card">
                        <span class="dash-stat-icon">📝</span>
                        <span class="dash-stat-value" id="dashTestsTaken">0</span>
                        <span class="dash-stat-label">Tests Taken</span>
                    </div>
                    <div class="dash-stat-card">
                        <span class="dash-stat-icon">📊</span>
                        <span class="dash-stat-value" id="dashAvgScore">0%</span>
                        <span class="dash-stat-label">Average Score</span>
                    </div>
                    <div class="dash-stat-card">
                        <span class="dash-stat-icon">🏆</span>
                        <span class="dash-stat-value" id="dashRank">#0</span>
                        <span class="dash-stat-label">Leaderboard Rank</span>
                    </div>
                    <div class="dash-stat-card">
                        <span class="dash-stat-icon">❓</span>
                        <span class="dash-stat-value" id="dashQuestions">0</span>
                        <span class="dash-stat-label">Questions Answered</span>
                    </div>
                </div>
                <div class="dashboard-actions">
                    <a href="index.html#topics" class="btn btn-primary">Start a Test</a>
                    <a href="index.html#leaderboard" class="btn btn-outline">View Leaderboard</a>
                </div>
            </div>
        </section>
    </main>

    <footer class="footer" role="contentinfo">
        <div class="container">
            <div class="footer-bottom">
                <span>&copy; 2026 Mockly</span>
                <div class="footer-bottom-links">
                    <a href="index.html">Home</a>
                    <a href="#">Privacy</a>
                    <a href="#">Terms</a>
                </div>
            </div>
        </div>
    </footer>

    <!-- Firebase + Dashboard logic -->
    <script src="firebase.js"></script>
    <script>
        // Wait for Firebase to be ready
        firebase.auth().onAuthStateChanged((user) => {
            if (!user) {
                // Not logged in – redirect to home
                window.location.href = 'index.html';
                return;
            }

            // Display user info
            const welcomeEl = document.getElementById('dashboardWelcome');
            if (welcomeEl) {
                welcomeEl.textContent = `Welcome back, ${user.displayName || user.email}!`;
            }

            // Dummy stats (replace with real data later)
            document.getElementById('dashTestsTaken').textContent = '12';
            document.getElementById('dashAvgScore').textContent = '78%';
            document.getElementById('dashRank').textContent = '#23';
            document.getElementById('dashQuestions').textContent = '480';

            // Logout button
            document.getElementById('btnLogout').addEventListener('click', async () => {
                await firebase.auth().signOut();
                window.location.href = 'index.html';
            });
        });
    </script>
</body>
</html>
